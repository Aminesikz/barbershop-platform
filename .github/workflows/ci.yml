name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least-privilege token: CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Node 22 (active LTS) — required for node:test module mocking
          # (--experimental-test-module-mocks, added in 22.3).
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck API (tsc --noEmit)
        run: npm run build --workspace=apps/api -- --noEmit

      - name: Run API tests
        run: npm test --workspace=apps/api

      - name: Build web (typecheck + bundle)
        run: npm run build --workspace=apps/web

      - name: Build web-admin (typecheck + bundle)
        run: npm run build --workspace=apps/web-admin
