name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least-privilege token: CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 (active LTS) — required for node:test module mocking
          # (--experimental-test-module-mocks, added in 22.3).
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run build --workspace=apps/api -- --noEmit

      - name: Run tests
        run: npm test --workspace=apps/api
