# Local dev infra for the barbershop API: Postgres + Redis.
# Bring up:   docker compose up -d
# Tear down:  docker compose down -v   (the -v also drops the seeded data)
#
# On first boot, everything in apps/api/db/ is auto-applied by Postgres
# (docker-entrypoint-initdb.d runs *.sql in filename order).
services:
  postgres:
    image: postgres:16-alpine
    container_name: barber-postgres
    environment:
      POSTGRES_USER: barber
      POSTGRES_PASSWORD: barber_dev_pw
      POSTGRES_DB: barbershop
    ports:
      - "5432:5432"
    volumes:
      - ./apps/api/db:/docker-entrypoint-initdb.d:ro
      - barber_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barber -d barbershop"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: barber-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  barber_pgdata:
